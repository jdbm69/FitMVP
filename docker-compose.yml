services:
  db:
    image: postgres:16-alpine
    container_name: fitmvp-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness_mvp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fitness_mvp"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: fitmvp-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fitness_mvp?schema=public
      PORT: 3001
    ports:
      - "3001:3001"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Same origin: UI on :8080 and fetch to /api → Nginx proxies to `api:3001`
        VITE_API_URL: /api
    container_name: fitmvp-web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
